apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankingapp-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bankapp-pod-lbl
  template:
    metadata:
      labels:
        app: bankapp-pod-lbl
    spec:
      containers:
      - name: banking-app-container
        image: janhavi225/bankingwebapp:12
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bankingapp-np-service
spec:
  type: NodePort
  selector:
    app: bankapp-pod-lbl
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 31022
